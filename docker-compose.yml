services:

  # Infrastructure 

  postgres:
    image: postgres:16
    container_name: timesync-postgres
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: timesync-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:latest
    container_name: timesync-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Backend Services

  auth-service:
    build: ./worktime-backend/auth-service
    container_name: timesync-auth
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/auth
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_PRIVATE_KEY_PATH: file:/run/secrets/private.pem
    volumes:
      - ./secrets/private.pem:/run/secrets/private.pem:ro
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  profile-service:
    build: ./worktime-backend/profile-service
    container_name: timesync-profile
    ports:
      - "8082:8082"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/profile_db
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    build: ./worktime-backend/notification-service
    container_name: timesync-notification
    ports:
      - "8085:8085"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/mail
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  team-service:
    build: ./worktime-backend/team-service
    container_name: timesync-team
    ports:
      - "8086:8086"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/team_service
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  task-service:
    build: ./worktime-backend/task-service
    container_name: timesync-task
    ports:
      - "8087:8087"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/task_db
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  conflict-service:
    build: ./worktime-backend/conflict-service
    container_name: timesync-conflict
    ports:
      - "8088:8088"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/conflict
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  api-gateway:
    build: ./worktime-backend/gateway
    container_name: timesync-gateway
    ports:
      - "8080:8080"
    environment:
      REDIS_HOST: redis
      AUTH_SERVICE_URL: http://auth-service:8081
      PROFILE_SERVICE_URL: http://profile-service:8082
      TEAM_SERVICE_URL: http://team-service:8086
      TASK_SERVICE_URL: http://task-service:8087
      CONFLICT_SERVICE_URL: http://conflict-service:8088
      JWT_PUBLIC_KEY_PATH: file:/run/secrets/public.pem
    volumes:
      - ./secrets/public.pem:/run/secrets/public.pem:ro
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      profile-service:
        condition: service_started
      team-service:
        condition: service_started
      task-service:
        condition: service_started
      conflict-service:
        condition: service_started

  # Frontend

  worktime-frontend:
    build: ./worktime-frontend
    container_name: timesync-frontend
    depends_on:
      - api-gateway

volumes:
  postgres_data:
